<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>IG Messenger</title>
<style>
/* ===== THEMES ===== */
:root{
  --bg:#000;--panel:#0a0a0a;--border:#262626;--muted:#a8a8a8;--text:#fafafa;
  --blue:#0095f6;--bubble:#262626;--mine:linear-gradient(135deg,#7c3aed,#ec4899,#f59e0b);
  --input-bg:#1a1a1a;--hover:#0f0f0f;--active-row:#141414;--composer-bg:#000;
  --sb-bg:#0a0a0a;--chat-bg:#000;
}
[data-theme="light"]{
  --bg:#fafafa;--panel:#fff;--border:#dbdbdb;--muted:#737373;--text:#262626;
  --bubble:#efefef;--mine:linear-gradient(135deg,#7c3aed,#ec4899,#f59e0b);
  --input-bg:#efefef;--hover:#f5f5f5;--active-row:#efefef;--composer-bg:#fff;
  --sb-bg:#fff;--chat-bg:#fafafa;
}
[data-theme="midnight"]{
  --bg:#0d1117;--panel:#161b22;--border:#30363d;--muted:#8b949e;--text:#e6edf3;
  --blue:#58a6ff;--bubble:#21262d;--mine:linear-gradient(135deg,#1f6feb,#58a6ff);
  --input-bg:#21262d;--hover:#1c2128;--active-row:#1c2128;--composer-bg:#0d1117;
  --sb-bg:#161b22;--chat-bg:#0d1117;
}
[data-theme="rose"]{
  --bg:#fff0f3;--panel:#fff;--border:#ffc2cc;--muted:#a05060;--text:#2d1b20;
  --blue:#e91e63;--bubble:#ffe0e6;--mine:linear-gradient(135deg,#e91e63,#ff5722);
  --input-bg:#ffe0e6;--hover:#ffd6de;--active-row:#ffd6de;--composer-bg:#fff;
  --sb-bg:#fff;--chat-bg:#fff0f3;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overscroll-behavior:none}
button{font:inherit;cursor:pointer}
input,textarea{font:inherit}
a{color:var(--blue);text-decoration:none}

/* ===== LOGOUT BUTTON ===== */
.logout-btn{
  background:#ef4444!important;color:#fff!important;border:0;border-radius:6px;
  padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
}
.logout-btn:hover{background:#dc2626!important}

/* ===== ROUTER VIEWS ===== */
.view{display:none}
.view.active{display:flex}

/* ===== AUTH PAGE ===== */
#view-login{min-height:100vh;align-items:center;justify-content:center;padding:20px;flex-direction:column;background:var(--bg)}
.auth-card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:32px 28px}
.auth-card h1{font-family:"Billabong",cursive;font-weight:400;text-align:center;font-size:42px;margin:0 0 24px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-card input{width:100%;padding:10px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);margin-bottom:8px}
.auth-card button.primary{width:100%;padding:10px;background:var(--blue);border:0;color:#fff;border-radius:6px;font-weight:600;margin-top:10px}
.auth-switch{text-align:center;color:var(--muted);margin-top:14px;font-size:14px}
.err{color:#ed4956;font-size:13px;margin-top:6px;min-height:18px}

/* ===== HOME PAGE ===== */
#view-home{flex-direction:column;height:100vh;background:var(--sb-bg)}
.home-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--panel);flex-shrink:0}
.home-header h2{margin:0;font-size:20px}
.home-header-right{display:flex;align-items:center;gap:10px}
.home-search{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.home-search input{width:100%;padding:8px 12px;background:var(--input-bg);border:0;border-radius:8px;color:var(--text)}
.home-list{flex:1;overflow-y:auto}
.home-footer{border-top:1px solid var(--border);padding:14px 20px;background:var(--panel);flex-shrink:0}
.home-footer .verify-row{display:flex;align-items:center;gap:8px}
.home-footer input{flex:1;padding:9px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text)}
.home-footer button{padding:9px 16px;background:var(--blue);border:0;border-radius:6px;color:#fff;font-weight:600}
.home-footer .verify-hint{font-size:12px;color:var(--muted);margin-top:6px}
.locked-overlay{position:absolute;inset:0;background:var(--bg);opacity:.7;pointer-events:none;z-index:5}

/* ===== CHAT PAGE ===== */
#view-chat{flex-direction:column;height:100vh;background:var(--chat-bg);position:relative}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--panel);flex-shrink:0}
.chat-header .back-btn{background:transparent;border:0;color:var(--text);font-size:22px;padding:0 8px 0 0;display:none}
.chat-header .info{flex:1;display:flex;flex-direction:column}
.chat-header .info .name{font-weight:600}
.chat-header .info .sub{color:var(--muted);font-size:12px}
.chat-header-right{display:flex;align-items:center;gap:8px}
.messages-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:6px;overscroll-behavior:contain}
.typing-bar{font-size:12px;color:var(--muted);padding:0 20px 4px;flex-shrink:0;min-height:20px}
.replying-bar{padding:8px 16px;border-top:1px solid var(--border);display:none;justify-content:space-between;align-items:center;background:var(--panel);color:var(--muted);font-size:12px;flex-shrink:0}
.replying-bar.visible{display:flex}
.replying-bar button{background:transparent;border:0;color:var(--muted);font-size:18px;line-height:1}
.composer{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;background:var(--composer-bg);flex-shrink:0;position:sticky;bottom:0}
.composer-ic{width:36px;height:36px;border-radius:50%;border:0;background:transparent;color:var(--text);display:flex;align-items:center;justify-content:center;font-size:20px}
.composer-ic:hover{background:var(--input-bg)}
.composer input[type=text]{flex:1;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:22px;color:var(--text);outline:none}
.composer .send{color:var(--blue);font-weight:600;background:transparent;border:0;padding:8px 10px}
.rec-active{color:#ed4956!important}

/* ===== SHARED LIST ROW ===== */
.row{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-bottom:1px solid transparent}
.row:hover{background:var(--hover)}
.row.active-conv{background:var(--active-row)}
.avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;flex-shrink:0;font-size:16px;position:relative;text-transform:uppercase}
.avatar.online::after{content:"";position:absolute;right:0;bottom:0;width:12px;height:12px;border-radius:50%;background:#22c55e;border:2px solid var(--bg)}
.row .meta{flex:1;min-width:0}
.row .meta .name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta .sub{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{background:var(--blue);color:#fff;border-radius:999px;min-width:20px;height:20px;padding:0 6px;font-size:12px;display:flex;align-items:center;justify-content:center}

/* ===== MESSAGES ===== */
.msg{display:flex;flex-direction:column;max-width:66%}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:22px;background:var(--bubble);color:var(--text);white-space:pre-wrap;word-wrap:break-word;font-size:14.5px}
.msg.mine .bubble{background:var(--mine);color:#fff}
.bubble.media-bubble{padding:4px;background:transparent}
.bubble img,.bubble video{max-width:260px;border-radius:18px;display:block}
.bubble audio{display:block}
.reply-preview{font-size:12px;color:var(--muted);border-left:2px solid var(--blue);padding:3px 8px;margin-bottom:4px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;background:var(--input-bg);border-radius:4px}
.reply-preview:hover{opacity:.8}
.msg-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:6px}
.last-seen-divider{text-align:center;font-size:12px;color:var(--muted);margin:10px 0;display:flex;align-items:center;gap:8px}
.last-seen-divider::before,.last-seen-divider::after{content:"";flex:1;height:1px;background:var(--border)}

/* ===== THEME PICKER ===== */
.theme-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 10px;font-size:13px}
.theme-btn:hover{background:var(--hover)}
.theme-menu{position:absolute;top:56px;right:16px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:6px;z-index:100;min-width:140px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.theme-menu.open{display:block}
.theme-opt{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:14px}
.theme-opt:hover{background:var(--hover)}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;right:20px;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:10px;max-width:320px;font-size:14px;display:none;animation:slideup .3s ease;z-index:999}
.toast.visible{display:block}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}

/* ===== MOBILE ===== */
@media(max-width:760px){
  #view-home .home-list .row{padding:12px 16px}
  #view-chat .messages-wrap{padding:12px}
  #view-chat .chat-header .back-btn{display:block}
  .msg{max-width:82%}
  .bubble img,.bubble video{max-width:220px}
  .theme-menu{top:52px;right:12px}
}
@media(max-width:400px){
  .auth-card{padding:24px 18px}
}
/* iOS safe area */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .composer{padding-bottom:calc(10px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="view-login" class="view">
  <div class="auth-card">
    <h1>Instagram</h1>
    <input id="au-username" placeholder="Username"/>
    <input id="au-email" placeholder="Email" type="email" style="display:none"/>
    <input id="au-fullname" placeholder="Full name" style="display:none"/>
    <input id="au-password" placeholder="Password" type="password"/>
    <div class="err" id="au-err"></div>
    <button class="primary" id="au-submit">Log in</button>
    <div class="auth-switch">
      <span id="au-switch-text">Don't have an account?</span>
      <a href="#" id="au-switch">Sign up</a>
    </div>
  </div>
</div>

<!-- ===== HOME PAGE ===== -->
<div id="view-home" class="view" style="position:relative">
  <div class="home-header">
    <h2 id="me-name">…</h2>
    <div class="home-header-right">
      <div style="position:relative">
        <button class="theme-btn" id="theme-toggle-home">🎨 Theme</button>
        <div class="theme-menu" id="theme-menu-home">
          <div class="theme-opt" data-theme="dark">🌑 Dark</div>
          <div class="theme-opt" data-theme="light">☀️ Light</div>
          <div class="theme-opt" data-theme="midnight">🌌 Midnight</div>
          <div class="theme-opt" data-theme="rose">🌸 Rose</div>
        </div>
      </div>
      <button class="logout-btn" id="logout-home">Logout</button>
    </div>
  </div>
  <div class="home-search"><input id="search" placeholder="Search users…"/></div>
  <div class="home-list" id="list"></div>
  <div id="locked-overlay" class="locked-overlay" style="display:none"></div>
  <div class="home-footer">
    <div class="verify-row">
      <input id="verify-input" type="password" placeholder="Enter access password…"/>
      <button id="verify-btn">Unlock</button>
    </div>
    <div class="verify-hint" id="verify-hint">Enter the access password to view conversations.</div>
  </div>
</div>

<!-- ===== CHAT PAGE ===== -->
<div id="view-chat" class="view" style="position:relative">
  <div class="chat-header">
    <button class="back-btn" id="back-btn">‹</button>
    <div class="avatar" id="ch-avatar"></div>
    <div class="info">
      <div class="name" id="ch-name"></div>
      <div class="sub" id="ch-sub">Offline</div>
    </div>
    <div class="chat-header-right">
      <div style="position:relative">
        <button class="theme-btn" id="theme-toggle-chat">🎨</button>
        <div class="theme-menu" id="theme-menu-chat">
          <div class="theme-opt" data-theme="dark">🌑 Dark</div>
          <div class="theme-opt" data-theme="light">☀️ Light</div>
          <div class="theme-opt" data-theme="midnight">🌌 Midnight</div>
          <div class="theme-opt" data-theme="rose">🌸 Rose</div>
        </div>
      </div>
      <button class="logout-btn" id="logout-chat">Logout</button>
    </div>
  </div>
  <div class="messages-wrap" id="messages"></div>
  <div class="typing-bar" id="typing"></div>
  <div class="replying-bar" id="replying">
    <span id="replying-text"></span>
    <button id="replying-cancel">✕</button>
  </div>
  <div class="composer">
    <button class="composer-ic" id="attach" title="Attach">＋</button>
    <input type="file" id="file" hidden accept="image/*,video/*,audio/*"/>
    <button class="composer-ic" id="rec" title="Voice note">🎤</button>
    <input id="text" type="text" placeholder="Message…"/>
    <button class="send" id="send">Send</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const API = '';
const ACCESS_PASSWORD = 'igmsg2024';  // hardcoded access password

/* ============================================================
   STATE
   ============================================================ */
let token = localStorage.getItem('token');
let me = null;
let ws = null;
let activeConv = null;
let activePeer = null;
let convs = [];
let replyTo = null;
let typingTimer = null;
let mediaRecorder = null;
let recChunks = [];
let unlocked = localStorage.getItem('unlocked') === '1';
let tabVisible = true;
let lastSeenMsgIds = JSON.parse(localStorage.getItem('lastSeen') || '{}');
// conv_id -> last message id the user saw
let intersectionObserver = null;

/* ============================================================
   HELPERS
   ============================================================ */
const $ = s => document.querySelector(s);
const el = (t, props={}, ...children) => {
  const e = document.createElement(t);
  Object.assign(e, props);
  children.flat().forEach(c => e.append(c));
  return e;
};
const initials = u => (u?.full_name || u?.username || '?').slice(0,2).toUpperCase();
const fmtTime = d => new Date(d).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
const showToast = t => {
  const x = $('#toast'); x.textContent = t; x.classList.add('visible');
  setTimeout(() => x.classList.remove('visible'), 3500);
};

/* ============================================================
   ROUTING
   ============================================================ */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  $('#view-'+name).classList.add('active');
}

/* ============================================================
   THEME
   ============================================================ */
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  document.querySelectorAll('.theme-menu').forEach(m => m.classList.remove('open'));
}
document.querySelectorAll('.theme-opt').forEach(opt => {
  opt.onclick = () => applyTheme(opt.dataset.theme);
});
$('#theme-toggle-home').onclick = e => {
  e.stopPropagation();
  $('#theme-menu-home').classList.toggle('open');
  $('#theme-menu-chat').classList.remove('open');
};
$('#theme-toggle-chat').onclick = e => {
  e.stopPropagation();
  $('#theme-menu-chat').classList.toggle('open');
  $('#theme-menu-home').classList.remove('open');
};
document.addEventListener('click', () => {
  document.querySelectorAll('.theme-menu').forEach(m => m.classList.remove('open'));
});

/* ============================================================
   LOGOUT
   ============================================================ */
function doLogout() {
  localStorage.removeItem('token');
  localStorage.removeItem('unlocked');
  if (ws) ws.close();
  window.location.href = 'https://google.com';
}
$('#logout-home').onclick = doLogout;
$('#logout-chat').onclick = doLogout;

/* ============================================================
   ACCESS PASSWORD (Feature 7)
   ============================================================ */
function renderLock() {
  const overlay = $('#locked-overlay');
  const list = $('#list');
  if (unlocked) {
    overlay.style.display = 'none';
    list.style.pointerEvents = '';
    list.style.opacity = '';
    $('#verify-hint').textContent = '✅ Access granted.';
    $('#verify-input').disabled = true;
    $('#verify-btn').disabled = true;
  } else {
    overlay.style.display = 'none'; // overlay is not needed, we block via pointer-events
    list.style.pointerEvents = 'none';
    list.style.opacity = '0.3';
    $('#verify-hint').textContent = 'Enter the access password to view conversations.';
    $('#verify-input').disabled = false;
    $('#verify-btn').disabled = false;
  }
}
$('#verify-btn').onclick = () => {
  const val = $('#verify-input').value;
  if (val === ACCESS_PASSWORD) {
    unlocked = true;
    localStorage.setItem('unlocked', '1');
    renderLock();
    loadConvs();
  } else {
    $('#verify-hint').textContent = '❌ Incorrect password.';
    $('#verify-input').value = '';
  }
};
$('#verify-input').addEventListener('keydown', e => { if(e.key==='Enter') $('#verify-btn').click(); });

/* ============================================================
   AUTH
   ============================================================ */
let authMode = 'login';
$('#au-switch').onclick = e => {
  e.preventDefault();
  authMode = authMode === 'login' ? 'register' : 'login';
  $('#au-email').style.display = authMode==='register'?'block':'none';
  $('#au-fullname').style.display = authMode==='register'?'block':'none';
  $('#au-submit').textContent = authMode==='login'?'Log in':'Sign up';
  $('#au-switch-text').textContent = authMode==='login'?"Don't have an account?":"Have an account?";
  $('#au-switch').textContent = authMode==='login'?'Sign up':'Log in';
};
$('#au-submit').onclick = async () => {
  $('#au-err').textContent = '';
  const body = authMode==='login'
    ? {username:$('#au-username').value, password:$('#au-password').value}
    : {username:$('#au-username').value, email:$('#au-email').value, full_name:$('#au-fullname').value, password:$('#au-password').value};
  try {
    const r = await fetch(`${API}/api/auth/${authMode}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail||'Error');
    token = d.access_token; me = d.user;
    localStorage.setItem('token', token);
    boot();
  } catch(e) { $('#au-err').textContent = e.message; }
};

/* ============================================================
   API
   ============================================================ */
async function api(path, opts={}) {
  const r = await fetch(API+path, {...opts, headers:{...(opts.headers||{}), 'Authorization':'Bearer '+token, ...(opts.body && !(opts.body instanceof FormData) ? {'Content-Type':'application/json'} : {})}});
  if (r.status===401) { localStorage.removeItem('token'); location.reload(); return; }
  return r.json();
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot() {
  if (!token) { showView('login'); return; }
  me = await api('/api/users/me');
  if (!me) { showView('login'); return; }
  $('#me-name').textContent = me.username;
  connectWS();
  renderLock();
  if (unlocked) await loadConvs();
  showView('home');
  requestNotificationPermission();
}

/* ============================================================
   TAB VISIBILITY (Feature 3 & 10)
   ============================================================ */
document.addEventListener('visibilitychange', () => {
  tabVisible = !document.hidden;
  wsSend({type:'presence_update', active: tabVisible});
});
window.addEventListener('focus', () => {
  tabVisible = true;
  wsSend({type:'presence_update', active: true});
});
window.addEventListener('blur', () => {
  tabVisible = false;
  wsSend({type:'presence_update', active: false});
});

/* ============================================================
   NOTIFICATIONS (Feature 10)
   ============================================================ */
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}
function sendBrowserNotif(title, body, convId) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  if (tabVisible && activeConv === convId) return; // only when tab is not active or different conv
  const n = new Notification(title, {body, icon: '/favicon.ico', tag: convId});
  n.onclick = () => { window.focus(); n.close(); };
}

/* ============================================================
   WEBSOCKET
   ============================================================ */
function connectWS() {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?token=${token}`);
  ws.onopen = () => {
    wsSend({type:'presence_update', active: !document.hidden});
  };
  ws.onmessage = ev => {
    const d = JSON.parse(ev.data);
    if (d.type==='message') onIncomingMessage(d);
    else if (d.type==='typing') onTyping(d);
    else if (d.type==='seen') onSeen(d);
    else if (d.type==='presence') onPresence(d);
    else if (d.type==='notification') {
      const from = d.payload?.from;
      const preview = d.payload?.preview;
      const cid = d.payload?.conversation_id;
      // browser notification for background tab
      sendBrowserNotif(`💬 ${from}`, preview, cid);
      if (cid !== activeConv) showToast(`💬 ${from}: ${preview}`);
      loadConvs();
    }
  };
  ws.onclose = () => setTimeout(connectWS, 1500);
}
function wsSend(o) { if (ws && ws.readyState===1) ws.send(JSON.stringify(o)); }

/* ============================================================
   HOME / LIST
   ============================================================ */
async function loadConvs() {
  if (!unlocked) return;
  convs = await api('/api/conversations') || [];
  if (document.getElementById('view-home').classList.contains('active')) renderList();
}
function renderList(filterUsers) {
  const list = $('#list'); list.innerHTML = '';
  if (filterUsers) {
    filterUsers.forEach(u => {
      const row = el('div',{className:'row'});
      row.append(el('div',{className:'avatar'+(u.online?' online':'')}, initials(u)));
      row.append(el('div',{className:'meta'}, el('div',{className:'name'},u.username), el('div',{className:'sub'},u.full_name||'')));
      row.onclick = async () => {
        if (!unlocked) return;
        const c = await api('/api/conversations',{method:'POST',body:JSON.stringify({user_id:u.id})});
        $('#search').value='';
        await loadConvs();
        openConv(c.id);
      };
      list.append(row);
    });
    return;
  }
  convs.forEach(c => {
    const peer = c.participants.find(p=>p.id!==me.id)||c.participants[0];
    const row = el('div',{className:'row'+(c.id===activeConv?' active-conv':'')});
    row.append(el('div',{className:'avatar'+(peer.online?' online':'')}, initials(peer)));
    const meta = el('div',{className:'meta'});
    meta.append(el('div',{className:'name'}, peer.username));
    const sub = c.last_message ? ((c.last_message.sender_id===me.id?'You: ':'')+(c.last_message.content||'[media]')) : 'Say hi 👋';
    meta.append(el('div',{className:'sub'}, sub));
    row.append(meta);
    if (c.unread) row.append(el('div',{className:'badge'}, String(c.unread)));
    row.onclick = () => { if (!unlocked) return; openConv(c.id); };
    list.append(row);
  });
}

/* ============================================================
   SEARCH
   ============================================================ */
let searchTimer;
$('#search').oninput = e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { renderList(); return; }
  searchTimer = setTimeout(async () => {
    if (!unlocked) return;
    const users = await api('/api/users/search?q='+encodeURIComponent(q));
    renderList(users||[]);
  }, 200);
};

/* ============================================================
   OPEN CHAT (Features 5, 6, 9)
   ============================================================ */
async function openConv(id) {
  activeConv = id;
  const c = convs.find(x=>x.id===id);
  activePeer = c?.participants.find(p=>p.id!==me.id)||c?.participants[0];
  $('#ch-avatar').textContent = initials(activePeer);
  $('#ch-avatar').className = 'avatar'+(activePeer?.online?' online':'');
  $('#ch-name').textContent = activePeer?.username||'';
  updatePeerSub();
  renderList();

  showView('chat');

  const msgs = await api(`/api/conversations/${id}/messages?limit=100`) || [];
  const msgEl = $('#messages');
  msgEl.innerHTML = '';

  // destroy old intersection observer
  if (intersectionObserver) { intersectionObserver.disconnect(); intersectionObserver = null; }

  const lastSeenId = lastSeenMsgIds[id];
  let insertedDivider = false;

  msgs.forEach((m, idx) => {
    // Insert "last seen" divider
    if (!insertedDivider && lastSeenId) {
      if (m.id === lastSeenId) {
        // divider AFTER this message
      }
      if (idx > 0 && msgs[idx-1].id === lastSeenId) {
        const div = el('div',{className:'last-seen-divider'}, '↑ Last seen');
        msgEl.append(div);
        insertedDivider = true;
      }
    }
    addMessage(m, false);
  });

  // Scroll to last seen position or bottom
  if (lastSeenId) {
    const lastSeenEl = document.getElementById('m-'+lastSeenId);
    if (lastSeenEl) {
      lastSeenEl.scrollIntoView({block:'center'});
    } else {
      scrollBottom();
    }
  } else {
    scrollBottom();
  }

  setupSeenObserver(msgs);
}

/* ============================================================
   INTERSECTION OBSERVER FOR SEEN (Feature 9)
   ============================================================ */
function setupSeenObserver(msgs) {
  const unseenFromOthers = msgs.filter(m => m.sender_id !== me.id && !(m.seen_by||[]).includes(me.id));
  if (!unseenFromOthers.length) return;

  intersectionObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const mid = entry.target.dataset.msgId;
      if (!mid) return;
      // Mark as seen
      wsSend({type:'seen', conversation_id:activeConv, message_id:mid});
      // Track last seen
      lastSeenMsgIds[activeConv] = mid;
      localStorage.setItem('lastSeen', JSON.stringify(lastSeenMsgIds));
      intersectionObserver.unobserve(entry.target);
    });
  }, {threshold: 0.5});

  unseenFromOthers.forEach(m => {
    const el = document.getElementById('m-'+m.id);
    if (el) {
      el.dataset.msgId = m.id;
      intersectionObserver.observe(el);
    }
  });
}

/* ============================================================
   ADD MESSAGE (Features 4, 9)
   ============================================================ */
function addMessage(m, scrollToIt=true) {
  const mine = m.sender_id === me.id;
  const w = el('div',{className:'msg '+(mine?'mine':'theirs'), id:'m-'+m.id});
  w.dataset.msgId = m.id;

  // Reply preview (Feature 4)
  if (m.reply_to) {
    const origEl = document.querySelector('#m-'+m.reply_to+' .bubble');
    const rp = el('div',{className:'reply-preview'}, '↩ '+(origEl?origEl.textContent.slice(0,80):'message'));
    rp.onclick = () => {
      const target = document.getElementById('m-'+m.reply_to);
      if (target) target.scrollIntoView({behavior:'smooth',block:'center'});
    };
    w.append(rp);
  }

  let bubble;
  if (m.media) {
    bubble = el('div',{className:'bubble media-bubble'});
    if (m.media.type==='image') bubble.append(el('img',{src:m.media.url,loading:'lazy'}));
    else if (m.media.type==='video') { const v=el('video',{src:m.media.url,controls:true}); bubble.append(v); }
    else { const a=el('audio',{src:m.media.url,controls:true}); bubble.append(a); }
    if (m.content) { const tb=el('div',{className:'bubble',style:'margin-top:4px'},m.content); w.append(bubble,tb); bubble=tb; }
    else w.append(bubble);
  } else {
    bubble = el('div',{className:'bubble'}, m.content||'');
    w.append(bubble);
  }

  // Double-tap / dblclick to reply (Feature 4)
  bubble.ondblclick = () => startReply(m);
  // Long press for mobile reply
  let pressTimer;
  bubble.addEventListener('touchstart', () => { pressTimer = setTimeout(() => startReply(m), 600); }, {passive:true});
  bubble.addEventListener('touchend', () => clearTimeout(pressTimer));
  bubble.addEventListener('touchmove', () => clearTimeout(pressTimer));

  const metaRow = el('div',{className:'msg-meta'}, fmtTime(m.created_at));
  if (mine) {
    const seenSpan = el('span',{id:'seen-'+m.id}, (m.seen_by||[]).some(u=>u!==me.id)?'· Seen':'· Sent');
    metaRow.append(seenSpan);
  }
  w.append(metaRow);
  $('#messages').append(w);

  if (scrollToIt) scrollBottom();
}

function startReply(m) {
  replyTo = m.id;
  $('#replying').classList.add('visible');
  $('#replying-text').textContent = '↩ Replying to: '+(m.content||'[media]').slice(0,60);
  $('#text').focus();
}

function scrollBottom() {
  const m = $('#messages'); m.scrollTop = m.scrollHeight;
}
$('#replying-cancel').onclick = () => { replyTo=null; $('#replying').classList.remove('visible'); };

/* ============================================================
   BACK BUTTON (mobile)
   ============================================================ */
$('#back-btn').onclick = () => {
  activeConv = null;
  activePeer = null;
  showView('home');
  renderList();
};

/* ============================================================
   COMPOSER
   ============================================================ */
$('#text').addEventListener('input', () => {
  if (!activeConv) return;
  wsSend({type:'typing', conversation_id:activeConv, is_typing:true});
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => wsSend({type:'typing',conversation_id:activeConv,is_typing:false}), 1500);
});
$('#text').addEventListener('keydown', e => {
  if(e.key==='Enter'){ e.preventDefault(); doSend(); }
});

// Replace .onclick with addEventListener + guard, and remove any old assignment first
let sendInFlight = false;
$('#send').onclick = null; // clear any prior binding
$('#send').addEventListener('click', e => {
  e.preventDefault();
  doSend();
}, {passive:false});

async function doSend() {
  if (sendInFlight) return;
  const content = $('#text').value.trim();
  if (!content||!activeConv) return;
  sendInFlight = true;
  $('#send').disabled = true;
  try {
    wsSend({type:'message', conversation_id:activeConv, content, reply_to:replyTo});
    $('#text').value=''; replyTo=null; $('#replying').classList.remove('visible');
  } finally {
    setTimeout(()=>{ sendInFlight=false; $('#send').disabled=false; }, 400);
  }
}
async function doSend1() {
  const content = $('#text').value.trim();
  if (!content||!activeConv) return;
  wsSend({type:'message', conversation_id:activeConv, content, reply_to:replyTo});
  $('#text').value=''; replyTo=null; $('#replying').classList.remove('visible');
}

$('#attach').onclick = () => $('#file').click();
$('#file').onchange = async e => {
  const f = e.target.files[0]; if(!f||!activeConv) return;
  const fd = new FormData(); fd.append('file',f);
  const m = await api('/api/uploads',{method:'POST',body:fd});
  if (!m) return;
  wsSend({type:'message',conversation_id:activeConv,media:m,reply_to:replyTo});
  replyTo=null; $('#replying').classList.remove('visible'); $('#file').value='';
};

$('#rec').onclick = async () => {
  if (!activeConv) return;
  if (mediaRecorder && mediaRecorder.state==='recording') {
    mediaRecorder.stop(); $('#rec').classList.remove('rec-active'); return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    recChunks = [];
    mediaRecorder.ondataavailable = e => recChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t=>t.stop());
      const blob = new Blob(recChunks,{type:'audio/webm'});
      const fd = new FormData(); fd.append('file',new File([blob],'voice.webm',{type:'audio/webm'}));
      const m = await api('/api/uploads',{method:'POST',body:fd});
      if (m) { m.type='audio'; wsSend({type:'message',conversation_id:activeConv,media:m}); }
    };
    mediaRecorder.start();
    $('#rec').classList.add('rec-active');
  } catch(e) { showToast('Mic permission needed'); }
};

/* ============================================================
   WS EVENTS
   ============================================================ */
function onIncomingMessage(d) {
  if (d.conversation_id === activeConv) {
    addMessage(d);
    if (d.sender_id !== me.id) {
      // Only mark seen if tab is visible and chat is open
      if (tabVisible && !document.hidden) {
        wsSend({type:'seen', conversation_id:activeConv, message_id:d.id});
        lastSeenMsgIds[activeConv] = d.id;
        localStorage.setItem('lastSeen', JSON.stringify(lastSeenMsgIds));
      } else {
        // Setup observer for this new message
        const msgEl = document.getElementById('m-'+d.id);
        if (msgEl && intersectionObserver) {
          msgEl.dataset.msgId = d.id;
          intersectionObserver.observe(msgEl);
        }
      }
    }
  }
  loadConvs();
}
function onTyping(d) {
  if (d.conversation_id !== activeConv) return;
  $('#typing').textContent = d.is_typing ? `${activePeer?.username} is typing…` : '';
}
function onSeen(d) {
  if (d.conversation_id !== activeConv) return;
  const sp = document.getElementById('seen-'+d.message_id);
  if (sp && d.user_id !== me.id) sp.textContent = '· Seen';
}
function onPresence(d) {
  if (activePeer && d.user_id === activePeer.id) {
    activePeer.online = d.online; activePeer.last_seen = d.last_seen;
    $('#ch-avatar').className = 'avatar'+(d.online?' online':'');
    updatePeerSub();
  }
  loadConvs();
}
function updatePeerSub() {
  if (!activePeer) return;
  $('#ch-sub').textContent = activePeer.online ? 'Active now' : ('Last seen '+(activePeer.last_seen?new Date(activePeer.last_seen).toLocaleString():'recently'));
}
